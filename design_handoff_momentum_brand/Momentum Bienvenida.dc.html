<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#E9EAEE;font-family:'Manrope',sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:40px}

  /* chevron stroke draw-in */
  @keyframes mtm-draw{from{stroke-dashoffset:760}to{stroke-dashoffset:0}}
  @keyframes mtm-rise{0%{opacity:0;transform:translateY(18px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes mtm-rise-soft{0%{opacity:0;transform:translateY(14px)}100%{opacity:.45;transform:translateY(0)}}
  @keyframes mtm-fadeup{0%{opacity:0;transform:translateY(14px)}100%{opacity:1;transform:translateY(0)}}
  @keyframes mtm-glow{0%,100%{transform:scale(1);opacity:.55}50%{transform:scale(1.12);opacity:.8}}
  @keyframes mtm-bar{0%{transform:scaleX(0)}100%{transform:scaleX(1)}}
</style>
</helmet>

<div style="display:flex;flex-direction:column;align-items:center;gap:20px">

  <!-- PHONE FRAME -->
  <div style="position:relative;width:390px;height:844px;border-radius:54px;background:#000;padding:12px;box-shadow:0 40px 90px -30px rgba(20,22,40,.55),0 0 0 1px rgba(0,0,0,.4)">
    <div style="position:absolute;top:24px;left:50%;transform:translateX(-50%);width:120px;height:32px;background:#000;border-radius:0 0 18px 18px;z-index:40"></div>

    <div style="position:relative;width:100%;height:100%;border-radius:43px;overflow:hidden;background:#0E0F13">

      <!-- ===== SPLASH ===== -->
      <sc-if value="{{ showSplash }}" hint-placeholder-val="{{ true }}">
        <div style="{{ splashStyle }}">
          <!-- ambient glow -->
          <div style="position:absolute;top:50%;left:50%;width:420px;height:420px;transform:translate(-50%,-58%);background:radial-gradient(circle,rgba(99,83,239,.42) 0%,rgba(99,83,239,0) 68%);filter:blur(6px);animation:mtm-glow 3.4s ease-in-out infinite"></div>

          <div style="position:relative;display:flex;flex-direction:column;align-items:center">
            <!-- logo tile -->
            <div style="width:108px;height:108px;border-radius:26px;background:linear-gradient(135deg,#1A1C26,#0C0D12);box-shadow:0 20px 44px -16px rgba(91,73,232,.6),inset 0 0 0 1px rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;animation:mtm-rise .7s cubic-bezier(.2,.8,.2,1) both">
              <svg width="76" height="76" viewBox="0 0 1024 1024">
                <defs>
                  <linearGradient id="bvA" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0" stop-color="#8E80FF"/><stop offset="1" stop-color="#5B49E8"/>
                  </linearGradient>
                </defs>
                <polyline points="300,520 512,360 724,520" fill="none" stroke="url(#bvA)" stroke-width="104" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="760" style="animation:mtm-draw .85s .25s cubic-bezier(.4,0,.2,1) both"/>
                <polyline points="300,700 512,540 724,700" fill="none" stroke="url(#bvA)" stroke-width="104" stroke-linecap="round" stroke-linejoin="round" opacity="0.45" stroke-dasharray="760" style="animation:mtm-draw .85s .5s cubic-bezier(.4,0,.2,1) both"/>
              </svg>
            </div>

            <!-- wordmark -->
            <div style="font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:38px;letter-spacing:-0.02em;color:#F3F5F9;margin-top:30px;animation:mtm-fadeup .6s .9s cubic-bezier(.2,.8,.2,1) both">Momentum</div>
            <!-- tagline -->
            <div style="font-size:15px;font-weight:500;color:#969CAB;margin-top:10px;letter-spacing:.01em;animation:mtm-fadeup .6s 1.1s cubic-bezier(.2,.8,.2,1) both">Cada paso, hacia arriba.</div>
          </div>

          <!-- progress bar at bottom -->
          <div style="position:absolute;bottom:64px;left:50%;transform:translateX(-50%);width:108px;height:3px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden">
            <div style="height:100%;width:100%;background:linear-gradient(90deg,#8E80FF,#6353EF);border-radius:99px;transform-origin:left;animation:mtm-bar 2.1s .3s cubic-bezier(.4,0,.2,1) both"></div>
          </div>
        </div>
      </sc-if>

      <!-- ===== LOGIN ===== -->
      <sc-if value="{{ showLogin }}" hint-placeholder-val="{{ false }}">
        <div style="{{ loginStyle }}">
          <!-- status bar spacer -->
          <div style="height:54px"></div>

          <div style="flex:1;display:flex;flex-direction:column;padding:0 28px">
            <!-- small logo + name -->
            <div style="display:flex;align-items:center;gap:12px;margin-top:18px">
              <div style="width:46px;height:46px;border-radius:13px;background:linear-gradient(135deg,#1A1C26,#0C0D12);box-shadow:0 8px 20px -8px rgba(91,73,232,.6);display:flex;align-items:center;justify-content:center">
                <svg width="32" height="32" viewBox="0 0 1024 1024">
                  <defs><linearGradient id="bvB" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8E80FF"/><stop offset="1" stop-color="#5B49E8"/></linearGradient></defs>
                  <polyline points="300,520 512,360 724,520" fill="none" stroke="url(#bvB)" stroke-width="104" stroke-linecap="round" stroke-linejoin="round"/>
                  <polyline points="300,700 512,540 724,700" fill="none" stroke="url(#bvB)" stroke-width="104" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>
                </svg>
              </div>
              <span style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:20px;color:#F3F5F9;letter-spacing:-0.01em">Momentum</span>
            </div>

            <!-- heading -->
            <div style="margin-top:48px">
              <h1 style="font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:30px;line-height:1.2;letter-spacing:-0.02em;color:#F3F5F9;text-wrap:balance">Bienvenido de vuelta</h1>
              <p style="font-size:15px;color:#969CAB;margin-top:10px;line-height:1.5">Retoma tu progreso donde lo dejaste. Tu entrenador te espera.</p>
            </div>

            <!-- form -->
            <div style="margin-top:34px;display:flex;flex-direction:column;gap:14px">
              <div style="display:flex;flex-direction:column;gap:8px">
                <label style="font-size:13px;font-weight:600;color:#969CAB">Correo</label>
                <input type="email" placeholder="tu@correo.com" style="height:52px;background:#181A20;border:1px solid #2A2D37;border-radius:14px;padding:0 16px;color:#F3F5F9;font-family:'Manrope';font-size:15px;outline:none" style-focus="border-color:#6353EF"/>
              </div>
              <div style="display:flex;flex-direction:column;gap:8px">
                <label style="font-size:13px;font-weight:600;color:#969CAB">Contraseña</label>
                <input type="password" placeholder="••••••••" style="height:52px;background:#181A20;border:1px solid #2A2D37;border-radius:14px;padding:0 16px;color:#F3F5F9;font-family:'Manrope';font-size:15px;outline:none" style-focus="border-color:#6353EF"/>
              </div>
              <div style="text-align:right;margin-top:2px"><a href="#" style="font-size:13px;font-weight:600;color:#8E80FF;text-decoration:none">¿Olvidaste tu contraseña?</a></div>
            </div>

            <!-- primary button -->
            <button style="height:54px;margin-top:8px;background:#6353EF;color:#fff;border:none;border-radius:14px;font-family:'Manrope';font-weight:700;font-size:16px;box-shadow:0 14px 30px -12px rgba(99,83,239,.7)" style-hover="background:#4B39D6">Entrar</button>

            <!-- divider -->
            <div style="display:flex;align-items:center;gap:14px;margin-top:24px">
              <div style="flex:1;height:1px;background:#2A2D37"></div>
              <span style="font-size:12px;color:#5B616E;font-weight:500">o continúa con</span>
              <div style="flex:1;height:1px;background:#2A2D37"></div>
            </div>
            <div style="display:flex;gap:12px;margin-top:18px">
              <button style="flex:1;height:50px;background:#181A20;border:1px solid #2A2D37;border-radius:14px;color:#F3F5F9;font-family:'Manrope';font-weight:600;font-size:14px" style-hover="border-color:#3A3F4B">Google</button>
              <button style="flex:1;height:50px;background:#181A20;border:1px solid #2A2D37;border-radius:14px;color:#F3F5F9;font-family:'Manrope';font-weight:600;font-size:14px" style-hover="border-color:#3A3F4B">Apple</button>
            </div>
          </div>

          <!-- footer -->
          <div style="padding:22px 28px 30px;text-align:center;font-size:14px;color:#969CAB">¿Aún no tienes cuenta? <a href="#" style="color:#8E80FF;font-weight:600;text-decoration:none">Crear cuenta</a></div>
        </div>
      </sc-if>

    </div>
  </div>

  <!-- replay control (outside phone) -->
  <button onClick="{{ replay }}" style="font-family:'Manrope';font-weight:600;font-size:13px;color:#5B616E;background:#fff;border:1px solid #D8DAE2;border-radius:99px;padding:9px 18px;cursor:pointer" style-hover="border-color:#6353EF;color:#4B39D6">↺ Reproducir intro de nuevo</button>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:470,&quot;height&quot;:960}}">
class Component extends DCLogic {
  state = { phase: 'splash', fading: false };

  componentDidMount(){ this.startTimers(); }
  componentWillUnmount(){ this.clear(); }

  clear(){ (this._t||[]).forEach(clearTimeout); this._t=[]; }

  startTimers(){
    this.clear();
    // begin fade-out near the end, then swap to login
    this._t.push(setTimeout(()=>this.setState({fading:true}), 2600));
    this._t.push(setTimeout(()=>this.setState({phase:'login', fading:false}), 3150));
  }

  replay(){ this.setState({phase:'splash', fading:false}, ()=>this.startTimers()); }

  renderVals(){
    const splashBase = "position:absolute;inset:0;z-index:30;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#12131A 0%,#0E0F13 60%,#0A0B0F 100%);transition:opacity .5s ease, transform .5s ease;";
    const loginBase = "position:absolute;inset:0;display:flex;flex-direction:column;background:#0E0F13;animation:mtm-fadeup .5s ease both;";
    return {
      showSplash: this.state.phase === 'splash',
      showLogin: this.state.phase === 'login',
      splashStyle: splashBase + (this.state.fading ? "opacity:0;transform:scale(1.04);" : "opacity:1;transform:scale(1);"),
      loginStyle: loginBase,
      replay: () => this.replay(),
    };
  }
}
</script>
</body>
</html>
